# ============================================================
# Example menu.yaml — mix langchain and light routers
# ============================================================

# FAST (LangChain)
# Works with .bind_tools(), agents, chains.
fast:
  type: langchain
  timeout: 30
  global_timeout: 180
  models:
    - id: google::gemini-2.5-flash
    - id: groq::openai/gpt-oss-20b
    - id: groq::meta-llama/llama-4-scout-17b-16e-instruct
    - id: ollama::gpt-oss:20b-cloud
    - id: openrouter::qwen/qwen3-4b:free

# FAST LIGHT (Light)
# No LangChain dependency. Returns plain dict.
fast_light:
  type: light
  timeout: 30
  global_timeout: 180
  models:
    - id: groq::llama-3.1-8b-instant
    - id: google::gemini-2.5-flash
    - id: groq::openai/gpt-oss-20b
    - id: openrouter::qwen/qwen3-4b:free

# THINK (LangChain)
# Deep reasoning and complex problem solving.
think:
  type: langchain
  timeout: 90
  global_timeout: 300
  models:
    - id: groq::openai/gpt-oss-120b
      params:
        reasoning_effort: high
    - id: groq::qwen/qwen3-32b
    - id: ollama::deepseek-v3.2:cloud
    - id: ollama::qwen3.5:122b-cloud
    - id: openrouter::deepseek/deepseek-r1-0528:free
    - id: google::gemini-2.5-pro

# THINK LIGHT (Light)
# Same reasoning models, no LangChain.
think_light:
  type: light
  timeout: 90
  global_timeout: 300
  models:
    - id: groq::openai/gpt-oss-120b
      params:
        reasoning_effort: high
    - id: groq::qwen/qwen3-32b
    - id: ollama::deepseek-v3.2:cloud
    - id: openrouter::qwen/qwen3-next-80b:free

# AGENT (LangChain)
# Built-in tools and multi-step processing.
agent:
  type: langchain
  timeout: 60
  global_timeout: 300
  models:
    - id: groq::groq/compound
    - id: groq::groq/compound-mini
    - id: groq::openai/gpt-oss-120b
    - id: ollama::nemotron-3-super:120b-cloud
    - id: openrouter::nvidia/nemotron-3-super:free
